plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.loginx'
version = '1.0.0'
archivesBaseName = 'LoginX'

repositories {
    mavenCentral()
    maven { url 'https://repo.papermc.io/repo/repository/maven-public/' }
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots/' } // SNAPSHOT gerekirse
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.21.1-R0.1-SNAPSHOT'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(21))
    }
}

tasks.named('jar') {
    archiveClassifier.set('')
}

// shadowJar zaten plugin tarafından geliyor, manuel task kaldırıldı

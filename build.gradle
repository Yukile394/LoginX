plugins {
    id 'java'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.loginx'
version = '1.0.0'
archivesBaseName = 'LoginX'

repositories {
    mavenCentral()
}

dependencies {
    // SNAPSHOT yerine lokal jar kullanıyoruz
    compileOnly files('libs/paper-api-1.21.1-R0.1.jar')
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(21))
    }
}

tasks.named('jar') {
    archiveClassifier.set('')
}

// ShadowJar plugin kendi task’ını sağlıyor, manuel ekleme yok

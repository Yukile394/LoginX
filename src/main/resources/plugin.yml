name: LoginX
version: 2.0.0
main: com.loginx.LoginX
api-version: 1.21
commands:
  # --- ESKİ TEMEL KOMUTLARIN (Giriş vb.) BURADA DURABİLİR ---
  register:
    description: Kayıt olma komutu
  login:
    description: Giriş yapma komutu
  
  # --- YENİ HOLOGRAM VE SKOR KOMUTLARI ---
  skorkill:
    description: Baktığın yere En Çok Öldürenler tablosunu koyar
    permission: loginx.admin
  skorzaman:
    description: Baktığın yere En Çok Oynayanlar tablosunu koyar
    permission: loginx.admin
  skorblok:
    description: Baktığın yere En Çok Blok Kıranlar tablosunu koyar
    permission: loginx.admin
  skorsil:
    description: Haritadaki tüm aktif skor hologramlarını temizler
    permission: loginx.admin

permissions:
  loginx.admin:
    description: Skor tablolarını yerleştirme yetkisi
    default: op
    

name: LoginX
version: 1.4.0
main: com.loginx.LoginX
api-version: 1.21
commands:
  register:
    description: Kayıt olma komutu
  login:
    description: Giriş yapma komutu
  logingoster:
    description: Verileri pembe menüde listeleme (OP)
    permission: loginx.admin
  sifredegis:
    description: Bir oyuncunun veya kendi şifreni değiştir (OP)
    usage: /sifredegis <oyuncu> <yeni_şifre>
    permission: loginx.admin
  izinver:
    description: Özel eşya ve WorldEdit izni verir (SADECE KONSOL)
    usage: /izinver <oyuncu>
  izinengelle:
    description: Özel izni oyuncudan geri alır (SADECE KONSOL)
    usage: /izinengelle <oyuncu>
  baltaizinver:
    description: Oyuncuya balta kullanma izni verir (SADECE KONSOL)
    usage: /baltaizinver <oyuncu>
  baltaizincikar:
    description: Oyuncunun balta kullanma iznini alır (SADECE KONSOL)
    usage: /baltaizincikar <oyuncu>
  izinvermenu:
    description: Güvenilir oyuncuları listeler (OP)
    permission: loginx.admin
permissions:
  loginx.admin:
    description: LoginX sistemini yönetme yetkisi
    default: op

name: LoginX
version: 1.0.0
main: com.loginx.LoginX
api-version: '1.21'
softdepend:
  - Vault

commands:
  register:
    description: Kayıt olma komutu

  login:
    description: Giriş yapma komutu

  skorkill:
    description: En çok öldürenler tablosu
    permission: loginx.admin

  skorzaman:
    description: En çok oynayanlar tablosu
    permission: loginx.admin

  skorblok:
    description: En çok blok kıranlar tablosu
    permission: loginx.admin

  skorsil:
    description: Skor hologramlarını temizler
    permission: loginx.admin

  trap:
    description: Trap ana komutu

  trapyap:
    description: Trap kaydeder
    permission: loginx.admin

  trapsil:
    description: Trap siler
    permission: loginx.admin

  trapbalta:
    description: Trap baltası verir
    permission: loginx.admin

  trapholo:
    description: Trap hologramı koyar
    permission: loginx.admin

  # Özel Kılıç Komutları
  shulkerkilicver:
    description: Shulker Kılıcı verir (Levitation 3s, CD 30s)
    usage: /shulkerkilicver [oyuncu]
    permission: loginx.admin

  endermankilicver:
    description: Enderman Kılıcı verir (ileri atılma, CD 30s)
    usage: /endermankilicver [oyuncu]
    permission: loginx.admin

  orumcekkilicver:
    description: Örümcek Kılıcı verir (ağ etkisi, CD 30s)
    usage: /orumcekkilicver [oyuncu]
    permission: loginx.admin

  phantomkilicver:
    description: Phantom Kılıcı verir (elytra yasağı, CD 230s)
    usage: /phantomkilicver [oyuncu]
    permission: loginx.admin

  golemkilicver:
    description: Golem Kılıcı verir (Resistance + Slowness, CD 230s)
    usage: /golemkilicver [oyuncu]
    permission: loginx.admin

  creeperkilicver:
    description: Creeper Kılıcı verir (patlama + knockback, CD 30s)
    usage: /creeperkilicver [oyuncu]
    permission: loginx.admin

permissions:
  loginx.admin:
    description: Admin yetkisi
    default: op

name: LoginX
version: 1.0.0
main: com.loginx.LoginX
api-version: '1.21'
softdepend: [Vault] # Vault yoksa bile plugin yüklenmeye çalışır, hata vermez.
commands:
  register:
    description: Kayit olma komutu
  login:
    description: Giris yapma komutu
  skorkill:
    description: En Cok Oldurenler tablosu
    permission: loginx.admin
  skorzaman:
    description: En Cok Oynayanlar tablosu
    permission: loginx.admin
  skorblok:
    description: En Cok Blok Kiranlar tablosu
    permission: loginx.admin
  skorsil:
    description: Skor hologramlarini temizler
    permission: loginx.admin
  trap:
    description: Trap ana komutu
  trapyap:
    description: Trap kaydeder
    permission: loginx.admin
  trapsil:
    description: Trap siler
    permission: loginx.admin
  trapbalta:
    description: Trap baltasi verir
    permission: loginx.admin
  trapholo:
    description: Trap hologrami koyar
    permission: loginx.admin

permissions:
  loginx.admin:
    description: Admin yetkisi
    default: op
    

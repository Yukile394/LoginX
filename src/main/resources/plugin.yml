name: LoginX
version: 1.0.0
main: com.loginx.LoginX
api-version: 1.21
commands:
  login:
    description: Oyuncu giriş yapar veya kayıt olur
    usage: /login <şifre>
  logingoster:
    description: Oyuncuların login bilgilerini gösterir (Sadece yetkililer)
    usage: /logingoster <oyuncu>
permissions:
  loginx.view:
    description: Oyuncuların loginlerini görebilir
    default: op

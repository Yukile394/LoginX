name: LoginX
version: 1.0.0
main: com.loginx.LoginX
api-version: 1.21
commands:
  register:
    description: Kayıt ol
    usage: /register <şifre> <şifre>
  login:
    description: Giriş yap
    usage: /login <şifre>
  logingoster:
    description: Oyuncu login bilgilerini gösterir (OP)
    usage: /logingoster <oyuncu>
  incele:
    description: Oyuncu inceleme menüsü (OP)
    usage: /incele <oyuncu>
permissions:
  loginx.view:
    description: Oyuncuların loginlerini görebilir
    default: op

name: Build LoginX

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - run: chmod +x gradlew
      - run: ./gradlew shadowJar

      - uses: actions/upload-artifact@v4
        with:
          name: LoginX
          path: build/libs/*.jar
